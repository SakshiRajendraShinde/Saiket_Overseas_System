<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern To-Do App</title>
 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
 
  <script src="https://kit.fontawesome.com/d1c2ea8b80.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrapper">

    <div class="todo-card">

      <h1 class="app-title">✨ My To-Do List</h1>
 
      <div class="input-section">
        <input 
          type="text" 
          id="todoUserInput" 
          placeholder="What needs to be done?"
        >
        <button id="addTodoButton">
          <i class="bi bi-plus-circle"></i>
        </button>
      </div>

       
      <ul id="todoItemsContainer"></ul>

       
      <div class="bottom-section">
        <button id="saveTodoButton" class="save-btn">
          <i class="fas fa-save"></i> Save Tasks
        </button>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
